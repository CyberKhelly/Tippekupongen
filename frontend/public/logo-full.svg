  <rect width="48" height="48" rx="10" fill="#111111"/>
  <rect x="9"  y="28" width="8" height="12" rx="2" fill="#F5C542" fill-opacity="0.45"/>
  <rect x="20" y="18" width="8" height="22" rx="2" fill="#F5C542" fill-opacity="0.70"/>
  <rect x="31" y="10" width="8" height="30" rx="2" fill="#F5C542"/>
  <!-- Wordmark -->
  <text
    x="58"
    y="31"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif"
    font-size="19"
